<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Reindirizzamento...</title>
    <script>
      // GitHub Pages SPA redirect: stores path in query param and redirects to same directory
      var l = window.location;
      l.replace("?p=" + encodeURIComponent(l.pathname + l.search + l.hash));
    </script>
  </head>
  <body></body>
</html>
