<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Reindirizzamento...</title>
    <script>
      var l = window.location;
      var p = l.pathname;
      var base = p.replace(/\/[^/]*$/, "/");
      var qs = new URLSearchParams(l.search);
      if (qs.get("p") === p) {
        l.replace(base);
      } else {
        l.replace(base + "index.html?p=" + encodeURIComponent(p));
      }
    </script>
  </head>
  <body></body>
</html>
